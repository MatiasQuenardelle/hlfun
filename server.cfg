// Quake 3 Arena - Server Configuration
// Hosted in São Paulo for low-latency play from Argentina

seta sv_hostname "Argentina Q3 Server"
seta sv_maxclients 12
seta sv_pure 1
seta rconPassword "q3admin"
seta g_gametype 0          // 0=FFA, 1=Tournament, 3=TDM, 4=CTF
seta fraglimit 25
seta timelimit 15
seta g_inactivity 180      // kick AFK after 3 minutes
seta g_forcerespawn 5
seta sv_allowDownload 1

// Map rotation
set d1 "map q3dm7; set nextmap vstr d2"
set d2 "map q3dm17; set nextmap vstr d3"
set d3 "map q3dm1; set nextmap vstr d1"
vstr d1
